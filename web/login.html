<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン - 漫画ライブラリ</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f7;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-card {
        background: white;
        border-radius: 16px;
        padding: 48px 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
      }

      .login-logo {
        text-align: center;
        margin-bottom: 32px;
      }

      .login-logo h1 {
        font-size: 28px;
        font-weight: 700;
        color: #1d1d1f;
        margin-bottom: 6px;
      }

      .login-logo p {
        font-size: 14px;
        color: #888;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #333;
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        background: #fafafa;
      }

      input:focus {
        border-color: #007aff;
        box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        background: white;
      }

      .login-button {
        width: 100%;
        padding: 16px;
        background: #007aff;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        margin-top: 8px;
      }

      .login-button:hover  { background: #0051d5; }
      .login-button:active { transform: scale(0.98); }
      .login-button:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .error-message {
        display: none;
        background: #fff0f0;
        border: 1px solid #ffcccc;
        color: #cc0000;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 16px;
      }

      .error-message.show { display: block; }

      .loading-spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-logo">
        <h1>📚 漫画ライブラリ</h1>
        <p>ログインしてください</p>
      </div>

      <div class="error-message" id="error-msg"></div>

      <div class="form-group">
        <label for="username">ユーザー名</label>
        <input
          type="text"
          id="username"
          name="username"
          autocomplete="username"
          placeholder="ユーザー名を入力"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">パスワード</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          placeholder="パスワードを入力"
          required
        />
      </div>

      <button class="login-button" id="login-btn">ログイン</button>
    </div>

    <script>
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const loginBtn      = document.getElementById('login-btn');
      const errorMsg      = document.getElementById('error-msg');

      function showError(message) {
        errorMsg.textContent = message;
        errorMsg.classList.add('show');
      }

      function clearError() {
        errorMsg.classList.remove('show');
      }

      function setLoading(loading) {
        loginBtn.disabled = loading;
        loginBtn.innerHTML = loading
          ? '<span class="loading-spinner"></span>ログイン中...'
          : 'ログイン';
      }

      async function handleLogin() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username || !password) {
          showError('ユーザー名とパスワードを入力してください');
          return;
        }

        clearError();
        setLoading(true);

        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const data = await res.json();

          if (res.ok && data.success) {
            // ログイン成功 → ライブラリへリダイレクト
            window.location.href = '/';
          } else {
            showError(data.error || 'ログインに失敗しました');
            setLoading(false);
          }
        } catch {
          showError('サーバーに接続できません。再度お試しください。');
          setLoading(false);
        }
      }

      loginBtn.addEventListener('click', handleLogin);

      // Enterキーでログイン
      [usernameInput, passwordInput].forEach(el => {
        el.addEventListener('keydown', e => {
          if (e.key === 'Enter') handleLogin();
        });
      });
    </script>
  </body>
</html>
